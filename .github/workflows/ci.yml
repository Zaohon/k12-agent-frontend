name: Frontend CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'
        cache-dependency-path: k12-agent-frontend/package-lock.json

    - name: Install dependencies
      run: npm install
      working-directory: k12-agent-frontend

    - name: Type Check
      run: npm run type-check
      working-directory: k12-agent-frontend
      continue-on-error: true

    - name: Run Build
      run: npm run build
      working-directory: k12-agent-frontend
