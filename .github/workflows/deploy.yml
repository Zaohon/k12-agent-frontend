name: Frontend Production CD

on:
  push:
    branches: [ main ]

jobs:
  # ─── Step 1: Build image on GitHub's powerful servers and push to GHCR ───
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner | toLower }}/k12-agent-frontend:latest

  # ─── Step 2: SSH to server → pull pre-built image → restart (no build!) ───
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH Remote Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.REMOTE_IP }}
          username: ${{ secrets.REMOTE_USER }}
          password: ${{ secrets.REMOTE_PASSWORD }}
          timeout: 5m
          command_timeout: 5m
          script: |
            docker pull ghcr.io/${{ github.repository_owner | toLower }}/k12-agent-frontend:latest
            cd /root/K12AgentWeb
            docker compose down frontend || true
            docker compose up -d frontend

